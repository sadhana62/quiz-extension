<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Google Forms Study Helper Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="settings">
      <section class="settings__panel">
        <p class="settings__eyebrow">Chrome Extension Settings</p>
        <h1>Google Forms Study Helper</h1>
        <p class="settings__intro">
          Paste your Gemini API key to power the study explanations in Google Forms.
        </p>

        <form id="settings-form" class="settings__form">
          <label class="settings__field">
            <span>Gemini API key</span>
            <input
              id="api-key"
              name="apiKey"
              type="password"
              autocomplete="off"
              placeholder="AIza..."
              required
            >
          </label>

          <button class="settings__save" type="submit">Save settings</button>
          <p id="status" class="settings__status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
